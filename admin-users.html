<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - CodeQuest</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold mb-6">📊 用户注册信息</h1>
        
        <div class="bg-white rounded-lg shadow overflow-hidden">
            <table class="min-w-full">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">姓名</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">邮箱</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">QQ</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">角色</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">注册时间</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">最后登录</th>
                    </tr>
                </thead>
                <tbody id="userTable" class="divide-y divide-gray-200">
                    <tr><td colspan="7" class="px-6 py-4 text-center">加载中...</td></tr>
                </tbody>
            </table>
        </div>
        
        <div class="mt-4 text-sm text-gray-600">
            <p>💡 提示：刷新页面可获取最新数据</p>
        </div>
    </div>

    <script>
        async function loadUsers() {
            try {
                const response = await fetch('/api/admin/users');
                const data = await response.json();
                
                const tbody = document.getElementById('userTable');
                
                if (!data.users || data.users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-4 text-center">暂无用户</td></tr>';
                    return;
                }
                
                tbody.innerHTML = data.users.map(user => `
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${user.id}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${user.name || '-'}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${user.email}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${user.qq || '-'}</td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2 py-1 text-xs rounded-full ${
                                user.role === 'super_admin' ? 'bg-red-100 text-red-800' :
                                user.role === 'admin' ? 'bg-blue-100 text-blue-800' :
                                'bg-green-100 text-green-800'
                            }">${user.role}</span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${new Date(user.created_at).toLocaleString('zh-CN')}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${user.last_login ? new Date(user.last_login).toLocaleString('zh-CN') : '-'}</td>
                    </tr>
                `).join('');
            } catch (error) {
                document.getElementById('userTable').innerHTML = 
                    `<tr><td colspan="7" class="px-6 py-4 text-center text-red-500">加载失败：${error.message}</td></tr>`;
            }
        }
        
        loadUsers();
    </script>
</body>
</html>
