<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日挑战 - CodeQuest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  
  <style>
    :root {
      --primary: #5865f2;
      --secondary: #eb459e;
      --bg: #1a1a2e;
      --surface: #16213e;
      --border: #0f3460;
      --text: #eaeaea;
      --comment: #a0a0a0;
    }
    [data-theme="duolingo"] {
      --primary: #88c999;
      --secondary: #b8e6b8;
      --bg: #f0f8f0;
      --surface: #e8f4e8;
      --border: #c9e0c9;
      --text: #2d3e2d;
      --comment: #6b7b6b;
    }
    body { background: var(--bg); color: var(--text); }
    .surface { background: var(--surface); border: 1px solid var(--border); }
    
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 5px var(--primary); }
      50% { box-shadow: 0 0 20px var(--primary), 0 0 30px var(--secondary); }
    }
    .daily-glow {
      animation: glow 3s infinite;
    }
  </style>
</head>
<body class="min-h-screen">
  <nav class="surface border-b">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2" style="color: var(--comment)">
        <i data-lucide="arrow-left" class="w-5 h-5"></i>
        <span>返回首页</span>
      </a>
      <div class="flex items-center gap-2">
        <i data-lucide="calendar" class="w-5 h-5" style="color: var(--primary)"></i>
        <span style="color: var(--text)" id="current-date"></span>
      </div>
    </div>
  </nav>

  <main class="max-w-3xl mx-auto px-4 py-8">
    <!-- 每日挑战卡片 -->
    <div class="surface rounded-xl p-8 mb-8 border-2 daily-glow" style="border-color: var(--primary)">
      <div class="text-center mb-6">
        <div class="text-6xl mb-4">🎯</div>
        <h1 class="text-3xl font-bold mb-2" style="color: var(--text)">每日挑战</h1>
        <p style="color: var(--comment)">完成今日挑战，获得双倍 XP 奖励！</p>
      </div>
      
      <div class="grid md:grid-cols-3 gap-4 mb-6">
        <div class="surface rounded-lg p-4 text-center">
          <div class="text-2xl mb-2">⏱️</div>
          <p class="text-sm" style="color: var(--comment)">限时</p>
          <p class="text-xl font-bold" style="color: var(--primary)">10 分钟</p>
        </div>
        <div class="surface rounded-lg p-4 text-center">
          <div class="text-2xl mb-2">💪</div>
          <p class="text-sm" style="color: var(--comment)">难度</p>
          <p class="text-xl font-bold" style="color: var(--secondary)">中等</p>
        </div>
        <div class="surface rounded-lg p-4 text-center">
          <div class="text-2xl mb-2">🎁</div>
          <p class="text-sm" style="color: var(--comment)">奖励</p>
          <p class="text-xl font-bold" style="color: #ffd700">50 XP</p>
        </div>
      </div>
      
      <div id="challenge-status" class="text-center">
        <button onclick="startChallenge()" class="py-3 px-8 rounded-lg font-semibold text-lg transition-all hover:opacity-90" style="background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white">
          🚀 开始挑战
        </button>
      </div>
    </div>
    
    <!-- 挑战说明 -->
    <div class="surface rounded-xl p-6 mb-8">
      <h2 class="text-xl font-bold mb-4" style="color: var(--text)">📋 挑战规则</h2>
      <ul class="space-y-2" style="color: var(--comment)">
        <li class="flex items-start gap-2">
          <i data-lucide="circle-check" class="w-5 h-5 flex-shrink-0" style="color: var(--primary)"></i>
          <span>完成 3 道编程题目，限时 10 分钟</span>
        </li>
        <li class="flex items-start gap-2">
          <i data-lucide="circle-check" class="w-5 h-5 flex-shrink-0" style="color: var(--primary)"></i>
          <span>全部答对获得 50 XP，每错一题扣 10 XP</span>
        </li>
        <li class="flex items-start gap-2">
          <i data-lucide="circle-check" class="w-5 h-5 flex-shrink-0" style="color: var(--primary)"></i>
          <span>每日凌晨 0 点刷新，不要错过哦！</span>
        </li>
        <li class="flex items-start gap-2">
          <i data-lucide="circle-check" class="w-5 h-5 flex-shrink-0" style="color: var(--primary)"></i>
          <span>连续完成 7 天额外奖励 200 XP！</span>
        </li>
      </ul>
    </div>
    
    <!-- 连胜记录 -->
    <div class="surface rounded-xl p-6">
      <h2 class="text-xl font-bold mb-4" style="color: var(--text)">🔥 连胜记录</h2>
      <div class="flex items-center justify-between">
        <div>
          <p class="text-sm" style="color: var(--comment)">当前连胜</p>
          <p class="text-3xl font-bold" id="streak-count" style="color: var(--primary)">0 天</p>
        </div>
        <div class="text-right">
          <p class="text-sm" style="color: var(--comment)">最长连胜</p>
          <p class="text-3xl font-bold" id="best-streak" style="color: var(--secondary)">0 天</p>
        </div>
      </div>
      <div class="mt-4 flex gap-1" id="streak-days">
        <!-- 连胜天数显示 -->
      </div>
    </div>
  </main>

  <script>
    const themes = {
      dark: { name: '🌙 极夜黑' },
      duolingo: { name: '🌿 护眼绿' }
    };
    
    // 显示当前日期
    const now = new Date();
    const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
    document.getElementById('current-date').textContent = now.toLocaleDateString('zh-CN', options);
    
    // 加载连胜记录
    function loadStreak() {
      const streakData = JSON.parse(localStorage.getItem('codequest_streak') || '{"current": 0, "best": 0, "lastDate": null}');
      document.getElementById('streak-count').textContent = streakData.current + '天';
      document.getElementById('best-streak').textContent = streakData.best + '天';
      
      // 渲染连胜天数
      const container = document.getElementById('streak-days');
      const days = [];
      for (let i = 0; i < 7; i++) {
        const completed = i < streakData.current;
        days.push(`
          <div class="flex-1 text-center p-2 rounded ${completed ? '' : 'opacity-30'}" 
               style="background: ${completed ? 'var(--primary)' : 'var(--border)'}; color: white">
            D${i + 1}
          </div>
        `);
      }
      container.innerHTML = days.join('');
    }
    
    // 开始挑战
    function startChallenge() {
      // 随机选择 3 道题目
      const challengeIds = [
        Math.floor(Math.random() * 10) + 1,
        Math.floor(Math.random() * 10) + 1,
        Math.floor(Math.random() * 10) + 1
      ];
      
      // 保存到 localStorage
      localStorage.setItem('daily_challenge', JSON.stringify({
        date: new Date().toDateString(),
        questions: challengeIds,
        completed: false,
        score: 0
      }));
      
      // 跳转到第一题
      window.location.href = `question.html?id=${challengeIds[0]}`;
    }
    
    // 检查今日是否已完成
    function checkDailyCompleted() {
      const challenge = JSON.parse(localStorage.getItem('daily_challenge') || '{}');
      if (challenge.date === new Date().toDateString() && challenge.completed) {
        document.getElementById('challenge-status').innerHTML = `
          <div class="text-center">
            <div class="text-4xl mb-4">✅</div>
            <p class="text-xl font-bold mb-2" style="color: var(--primary)">今日挑战已完成！</p>
            <p style="color: var(--comment)">获得 ${challenge.score} XP，明天再来吧！</p>
          </div>
        `;
      }
    }
    
    // 加载主题
    const savedTheme = localStorage.getItem('codequest_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    
    // 初始化
    loadStreak();
    checkDailyCompleted();
    lucide.createIcons();
  </script>
</body>
</html>
