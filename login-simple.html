<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - CodeQuest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --primary: #3b82f6;
      --secondary: #2563eb;
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --comment: #94a3b8;
    }
    [data-theme="duolingo"] {
      --primary: #88c999;
      --secondary: #b8e6b8;
      --bg: #f0f8f0;
      --surface: #e8f4e8;
      --border: #c9e0c9;
      --text: #2d3e2d;
      --comment: #6b7b6b;
    }
    [data-theme="python"] {
      --primary: #3776ab;
      --secondary: #ffd343;
      --bg: #1e4a6b;
      --surface: #2b5b84;
      --border: #3d7a9f;
      --text: #ffffff;
      --comment: #b8d4e8;
    }
    [data-theme="github"] {
      --primary: #3776ab;
      --secondary: #ffd343;
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --comment: #8b949e;
    }
    body { background: var(--bg); color: var(--text); }
    .surface { background: var(--surface); border: 1px solid var(--border); }
    .input-field { transition: all 0.2s; }
    .input-field:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <!-- 主题切换 -->
  <div class="fixed top-4 right-4">
    <div class="relative">
      <button onclick="toggleThemeMenu()" class="flex items-center gap-2 px-3 py-2 surface rounded-lg hover:opacity-80 transition-opacity" style="color: var(--comment)">
        <i data-lucide="palette" class="w-5 h-5"></i>
      </button>
      <div id="theme-menu" class="hidden absolute right-0 mt-2 w-40 surface rounded-lg shadow-xl border z-50" style="border-color: var(--border)">
        <div class="p-2">
          <button onclick="setTheme('dark')" class="w-full text-left px-3 py-2 rounded hover:opacity-80 flex items-center gap-2">
            <div class="w-4 h-4 rounded" style="background: linear-gradient(135deg, #1a1a2e, #5865f2)"></div>
            <span style="color: var(--text); font-size: 12px">🌙 极夜黑</span>
          </button>
          <button onclick="setTheme('duolingo')" class="w-full text-left px-3 py-2 rounded hover:opacity-80 flex items-center gap-2">
            <div class="w-4 h-4 rounded" style="background: linear-gradient(135deg, #88c999, #b8e6b8)"></div>
            <span style="color: var(--text); font-size: 12px">🌿 护眼绿</span>
          </button>
          <button onclick="setTheme('python')" class="w-full text-left px-3 py-2 rounded hover:opacity-80 flex items-center gap-2">
            <div class="w-4 h-4 rounded" style="background: linear-gradient(135deg, #3776ab, #ffd343)"></div>
            <span style="color: var(--text); font-size: 12px">🐍 科技蓝</span>
          </button>
          <button onclick="setTheme('github')" class="w-full text-left px-3 py-2 rounded hover:opacity-80 flex items-center gap-2">
            <div class="w-4 h-4 rounded" style="background: linear-gradient(135deg, #0d1117, #30363d)"></div>
            <span style="color: var(--text); font-size: 12px">💻 代码灰</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="surface rounded-2xl p-8 w-full max-w-md border-2" style="border-color: var(--primary)">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-xl mb-4 text-3xl" style="background: linear-gradient(135deg, #ff6b35, #f7c531)">
        🔥🔨
      </div>
      <h1 class="text-2xl font-bold mb-2">CodeQuest</h1>
      <p style="color: var(--comment)">在火焰中锻造你的编程技能</p>
    </div>
    
    <!-- 切换标签 -->
    <div class="flex mb-6">
      <button onclick="showTab('register')" id="tab-register" class="flex-1 py-2 px-4 rounded-lg font-semibold transition-all" style="background: var(--primary); color: white">注册</button>
      <button onclick="showTab('login')" id="tab-login" class="flex-1 py-2 px-4 rounded-lg font-semibold transition-all" style="background: transparent; color: var(--comment)">登录</button>
    </div>
    
    <!-- 注册表单 -->
    <form id="register-form" class="space-y-4" onsubmit="handleRegister(event)">
      <div>
        <label class="block text-sm font-medium mb-2">
          <i data-lucide="mail" class="w-4 h-4 inline mr-1"></i>
          邮箱地址
        </label>
        <input 
          type="email" 
          id="register-email" 
          class="input-field w-full px-4 py-3 rounded-lg surface border focus:outline-none"
          style="border-color: var(--border); color: var(--text)"
          placeholder="your@email.com"
          required
        />
        <p class="text-xs mt-1" style="color: var(--comment)">💡 使用真实邮箱，方便找回账号</p>
      </div>
      
      <div>
        <label class="block text-sm font-medium mb-2">
          <i data-lucide="lock" class="w-4 h-4 inline mr-1"></i>
          密码
        </label>
        <input 
          type="password" 
          id="register-password" 
          class="input-field w-full px-4 py-3 rounded-lg surface border focus:outline-none"
          style="border-color: var(--border); color: var(--text)"
          placeholder="至少 6 位"
          minlength="6"
          required
        />
      </div>
      
      <div>
        <label class="block text-sm font-medium mb-2">
          <i data-lucide="lock-keyhole" class="w-4 h-4 inline mr-1"></i>
          确认密码
        </label>
        <input 
          type="password" 
          id="register-confirm" 
          class="input-field w-full px-4 py-3 rounded-lg surface border focus:outline-none"
          style="border-color: var(--border); color: var(--text)"
          placeholder="再次输入密码"
          required
        />
      </div>
      
      <button 
        type="submit" 
        class="w-full py-3 px-4 rounded-lg font-semibold transition-all hover:opacity-90"
        style="background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white"
      >
        <i data-lucide="user-plus" class="w-5 h-5 inline mr-2"></i>
        立即注册
      </button>
    </form>
    
    <!-- 登录表单 -->
    <form id="login-form" class="space-y-4 hidden" onsubmit="handleLogin(event)">
      <div>
        <label class="block text-sm font-medium mb-2">
          <i data-lucide="mail" class="w-4 h-4 inline mr-1"></i>
          邮箱地址
        </label>
        <input 
          type="email" 
          id="login-email" 
          class="input-field w-full px-4 py-3 rounded-lg surface border focus:outline-none"
          style="border-color: var(--border); color: var(--text)"
          placeholder="your@email.com"
          required
        />
      </div>
      
      <div>
        <label class="block text-sm font-medium mb-2">
          <i data-lucide="lock" class="w-4 h-4 inline mr-1"></i>
          密码
        </label>
        <input 
          type="password" 
          id="login-password" 
          class="input-field w-full px-4 py-3 rounded-lg surface border focus:outline-none"
          style="border-color: var(--border); color: var(--text)"
          placeholder="请输入密码"
          required
        />
      </div>
      
      <button 
        type="submit" 
        class="w-full py-3 px-4 rounded-lg font-semibold transition-all hover:opacity-90"
        style="background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white"
      >
        <i data-lucide="log-in" class="w-5 h-5 inline mr-2"></i>
        登录
      </button>
    </form>
    
    <!-- 提示信息 -->
    <div id="message" class="hidden mt-4 p-3 rounded-lg text-sm text-center"></div>
    
    <!-- 底部提示 -->
    <div class="mt-6 pt-6 border-t text-center" style="border-color: var(--border)">
      <p class="text-sm" style="color: var(--comment)">
        🔒 注册即表示同意服务条款
      </p>
    </div>
  </div>

  <script>
    const API_BASE = 'http://127.0.0.1:3000/api';
    
    // 主题切换
    function setTheme(themeId) {
      document.documentElement.setAttribute('data-theme', themeId);
      localStorage.setItem('codequest_theme', themeId);
      document.getElementById('theme-menu').classList.add('hidden');
    }
    
    function toggleThemeMenu() {
      document.getElementById('theme-menu').classList.toggle('hidden');
    }
    
    // 加载主题
    const savedTheme = localStorage.getItem('codequest_theme') || 'dark';
    setTheme(savedTheme);
    
    // 点击外部关闭菜单
    document.addEventListener('click', (e) => {
      const menu = document.getElementById('theme-menu');
      if (!e.target.closest('.relative') && !menu.classList.contains('hidden')) {
        menu.classList.add('hidden');
      }
    });
    
    // 切换标签
    function showTab(tab) {
      const registerForm = document.getElementById('register-form');
      const loginForm = document.getElementById('login-form');
      const registerTab = document.getElementById('tab-register');
      const loginTab = document.getElementById('tab-login');
      
      if (tab === 'register') {
        registerForm.classList.remove('hidden');
        loginForm.classList.add('hidden');
        registerTab.style.background = 'var(--primary)';
        registerTab.style.color = 'white';
        loginTab.style.background = 'transparent';
        loginTab.style.color = 'var(--comment)';
      } else {
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
        loginTab.style.background = 'var(--primary)';
        loginTab.style.color = 'white';
        registerTab.style.background = 'transparent';
        registerTab.style.color = 'var(--comment)';
      }
      hideMessage();
    }
    
    // 注册
    async function handleRegister(event) {
      event.preventDefault();
      
      const email = document.getElementById('register-email').value.trim();
      const password = document.getElementById('register-password').value;
      const confirm = document.getElementById('register-confirm').value;
      
      // 验证邮箱
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        showMessage('❌ 邮箱格式不正确', 'error');
        return;
      }
      
      // 验证密码
      if (password.length < 6) {
        showMessage('❌ 密码至少 6 位', 'error');
        return;
      }
      
      // 验证密码一致性
      if (password !== confirm) {
        showMessage('❌ 两次输入的密码不一致', 'error');
        return;
      }
      
      try {
        const res = await fetch(`${API_BASE}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await res.json();
        
        if (data.success || data.user) {
          // 注册成功
          localStorage.setItem('codequest_current_user', email);
          localStorage.setItem('codequest_user_email', email);
          
          showMessage('✅ 注册成功！正在跳转...', 'success');
          
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 1000);
        } else {
          showMessage('❌ ' + (data.error || '注册失败'), 'error');
        }
      } catch (error) {
        // 如果后端 API 失败，本地模拟注册（开发阶段）
        console.log('API 不可用，使用本地注册');
        localStorage.setItem('codequest_current_user', email);
        localStorage.setItem('codequest_user_email', email);
        
        showMessage('✅ 注册成功！正在跳转...', 'success');
        
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1000);
      }
    }
    
    // 登录
    async function handleLogin(event) {
      event.preventDefault();
      
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      
      try {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await res.json();
        
        if (data.success || data.user) {
          localStorage.setItem('codequest_current_user', email);
          localStorage.setItem('codequest_user_email', email);
          
          showMessage('✅ 登录成功！正在跳转...', 'success');
          
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 1000);
        } else {
          showMessage('❌ ' + (data.error || '登录失败'), 'error');
        }
      } catch (error) {
        // 如果后端 API 失败，本地模拟登录（开发阶段）
        console.log('API 不可用，使用本地登录');
        localStorage.setItem('codequest_current_user', email);
        localStorage.setItem('codequest_user_email', email);
        
        showMessage('✅ 登录成功！正在跳转...', 'success');
        
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1000);
      }
    }
    
    // 显示消息
    function showMessage(text, type) {
      const message = document.getElementById('message');
      message.textContent = text;
      message.className = `mt-4 p-3 rounded-lg text-sm text-center ${
        type === 'success' ? 'text-green-400 bg-green-400/10' : 'text-red-400 bg-red-400/10'
      }`;
      message.classList.remove('hidden');
    }
    
    function hideMessage() {
      document.getElementById('message').classList.add('hidden');
    }
    
    // 检查是否已登录
    const currentUser = localStorage.getItem('codequest_current_user');
    if (currentUser) {
      window.location.href = 'index.html';
    }
    
    lucide.createIcons();
  </script>
</body>
</html>
