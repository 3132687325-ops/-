<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - CodeQuest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  
  <style>
    :root {
      --primary: #5865f2;
      --secondary: #eb459e;
      --bg: #1a1a2e;
      --surface: #16213e;
      --border: #0f3460;
      --text: #eaeaea;
      --comment: #a0a0a0;
    }
    [data-theme="duolingo"] {
      --primary: #88c999;
      --secondary: #b8e6b8;
      --bg: #f0f8f0;
      --surface: #e8f4e8;
      --border: #c9e0c9;
      --text: #2d3e2d;
      --comment: #6b7b6b;
    }
    [data-theme="python"] {
      --primary: #3776ab;
      --secondary: #ffd343;
      --bg: #1e4a6b;
      --surface: #2b5b84;
      --border: #3d7a9f;
      --text: #ffffff;
      --comment: #b8d4e8;
    }
    [data-theme="github"] {
      --primary: #3776ab;
      --secondary: #ffd343;
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --comment: #8b949e;
    }
    
    body {
      background: var(--bg);
      color: var(--text);
      transition: all 0.3s ease;
    }
    .surface {
      background: var(--surface);
      border: 1px solid var(--border);
    }
    
    .login-card {
      animation: slideIn 0.5s ease-out;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .input-field {
      transition: all 0.2s ease;
    }
    .input-field:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(88, 101, 242, 0.1);
    }
    
    .qq-icon {
      background: linear-gradient(135deg, #12B7F5, #0099FF);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <!-- 主题切换 -->
  <div class="fixed top-4 right-4">
    <div class="relative">
      <button onclick="toggleThemeMenu()" class="flex items-center gap-2 px-3 py-2 surface rounded-lg hover:opacity-80 transition-opacity" style="color: var(--comment)">
        <i data-lucide="palette" class="w-5 h-5"></i>
      </button>
      <div id="theme-menu" class="hidden absolute right-0 mt-2 w-40 surface rounded-lg shadow-xl border z-50" style="border-color: var(--border)">
        <div class="p-2">
          <button onclick="setTheme('dark')" class="w-full text-left px-3 py-2 rounded hover:opacity-80 flex items-center gap-2">
            <div class="w-4 h-4 rounded" style="background: linear-gradient(135deg, #1a1a2e, #5865f2)"></div>
            <span style="color: var(--text); font-size: 12px">🌙 极夜黑</span>
          </button>
          <button onclick="setTheme('duolingo')" class="w-full text-left px-3 py-2 rounded hover:opacity-80 flex items-center gap-2">
            <div class="w-4 h-4 rounded" style="background: linear-gradient(135deg, #88c999, #b8e6b8)"></div>
            <span style="color: var(--text); font-size: 12px">🌿 护眼绿</span>
          </button>
          <button onclick="setTheme('python')" class="w-full text-left px-3 py-2 rounded hover:opacity-80 flex items-center gap-2">
            <div class="w-4 h-4 rounded" style="background: linear-gradient(135deg, #3776ab, #ffd343)"></div>
            <span style="color: var(--text); font-size: 12px">🐍 科技蓝</span>
          </button>
          <button onclick="setTheme('github')" class="w-full text-left px-3 py-2 rounded hover:opacity-80 flex items-center gap-2">
            <div class="w-4 h-4 rounded" style="background: linear-gradient(135deg, #0d1117, #30363d)"></div>
            <span style="color: var(--text); font-size: 12px">💻 代码灰</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 登录卡片 -->
  <div class="login-card surface rounded-2xl p-8 w-full max-w-md border-2" style="border-color: var(--primary)">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-xl mb-4 text-3xl" style="background: linear-gradient(135deg, #ff6b35, #f7c531)">
        🔥🔨
      </div>
      <h1 class="text-2xl font-bold mb-2" style="color: var(--text)">CodeQuest</h1>
      <p style="color: var(--comment)">在火焰中锻造你的编程技能</p>
    </div>
    
    <!-- 登录表单 -->
    <form id="login-form" class="space-y-4" onsubmit="handleLogin(event)">
      <div>
        <label class="block text-sm font-medium mb-2" style="color: var(--text)">
          <i data-lucide="user" class="w-4 h-4 inline mr-1"></i>
          QQ 号
        </label>
        <input 
          type="text" 
          id="login-qq" 
          class="input-field w-full px-4 py-3 rounded-lg surface border focus:outline-none"
          style="border-color: var(--border); color: var(--text)"
          placeholder="请输入 QQ 号"
          pattern="[0-9]{5,12}"
          required
        />
      </div>
      
      <div>
        <label class="block text-sm font-medium mb-2" style="color: var(--text)">
          <i data-lucide="lock" class="w-4 h-4 inline mr-1"></i>
          密码
        </label>
        <div class="relative">
          <input 
            type="password" 
            id="login-password" 
            class="input-field w-full px-4 py-3 rounded-lg surface border focus:outline-none"
            style="border-color: var(--border); color: var(--text); padding-right: 40px"
            placeholder="请输入密码"
            required
          />
          <button 
            type="button" 
            onclick="togglePassword('login-password')"
            class="absolute right-3 top-1/2 -translate-y-1/2"
            style="color: var(--comment)"
          >
            <i data-lucide="eye" class="w-5 h-5"></i>
          </button>
        </div>
      </div>
      
      <button 
        type="submit" 
        class="w-full py-3 px-4 rounded-lg font-semibold transition-all hover:opacity-90"
        style="background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white"
      >
        <i data-lucide="log-in" class="w-5 h-5 inline mr-2"></i>
        登录
      </button>
    </form>
    
    <!-- 提示信息 -->
    <div id="message" class="hidden mt-4 p-3 rounded-lg text-sm text-center"></div>
    
    <div class="mt-6 pt-6 border-t text-center" style="border-color: var(--border)">
      <p class="text-sm" style="color: var(--comment)">
        没有账号？
        <a href="register.html" class="font-medium underline" style="color: var(--primary)">去注册</a>
      </p>
    </div>
  </div>

  <script>
    // 主题切换
    function setTheme(themeId) {
      document.documentElement.setAttribute('data-theme', themeId);
      localStorage.setItem('codequest_theme', themeId);
      document.getElementById('theme-menu').classList.add('hidden');
    }
    
    function toggleThemeMenu() {
      document.getElementById('theme-menu').classList.toggle('hidden');
    }
    
    // 加载主题
    const savedTheme = localStorage.getItem('codequest_theme') || 'dark';
    setTheme(savedTheme);
    
    // 点击外部关闭菜单
    document.addEventListener('click', (e) => {
      const menu = document.getElementById('theme-menu');
      if (!e.target.closest('.relative') && !menu.classList.contains('hidden')) {
        menu.classList.add('hidden');
      }
    });
    
    // 切换登录/注册
    function showLogin() {
      document.getElementById('login-form').classList.remove('hidden');
      document.getElementById('register-form').classList.add('hidden');
      document.getElementById('tab-login').style.background = 'var(--primary)';
      document.getElementById('tab-login').style.color = 'white';
      document.getElementById('tab-register').style.background = 'transparent';
      document.getElementById('tab-register').style.color = 'var(--comment)';
      hideMessage();
    }
    
    // 显示/隐藏密码
    function togglePassword(inputId) {
      const input = document.getElementById(inputId);
      input.type = input.type === 'password' ? 'text' : 'password';
    }
    
    // 显示消息
    function showMessage(text, type) {
      const message = document.getElementById('message');
      message.textContent = text;
      message.className = `mt-4 p-3 rounded-lg text-sm text-center ${
        type === 'success' ? 'text-green-400 bg-green-400/10' : 'text-red-400 bg-red-400/10'
      }`;
      message.classList.remove('hidden');
    }
    
    function hideMessage() {
      document.getElementById('message').classList.add('hidden');
    }
    
    const API = (window.location.port === '3000' ? '' : (window.location.origin.includes('localhost') ? 'http://localhost:3000' : '')) + '/api';

    function handleLogin(event) {
      event.preventDefault();
      const qq = document.getElementById('login-qq').value.trim();
      const password = document.getElementById('login-password').value;

      if (!/^\d{5,12}$/.test(qq)) {
        showMessage('❌ QQ 号格式不正确（5-12 位数字）', 'error');
        return;
      }

      fetch(API + '/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ qq, password })
      })
        .then(r => r.json())
        .then(data => {
          if (data.error) {
            showMessage('❌ ' + data.error, 'error');
            return;
          }
          localStorage.setItem('codequest_token', data.user.token);
          localStorage.setItem('codequest_user', JSON.stringify(data.user));
          showMessage('✅ 登录成功！正在跳转...', 'success');
          setTimeout(() => { window.location.href = 'index.html'; }, 1000);
        })
        .catch(() => showMessage('❌ 网络错误，请稍后重试', 'error'));
    }
    
    const token = localStorage.getItem('codequest_token');
    if (token) {
      try {
        const user = JSON.parse(localStorage.getItem('codequest_user'));
        if (user) window.location.href = 'index.html';
      } catch (e) {
        localStorage.removeItem('codequest_token');
        localStorage.removeItem('codequest_user');
      }
    }
    
    lucide.createIcons();
  </script>
</body>
</html>
