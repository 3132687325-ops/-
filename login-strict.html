<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 / 注册 - CodeQuest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --primary: #7367f0;
      --primary-soft: rgba(115, 103, 240, 0.16);
      --secondary: #8f85ff;
      --bg: #23273d;
      --panel: #303552;
      --panel-strong: #2b3049;
      --border: rgba(201, 209, 255, 0.14);
      --text: #eef1ff;
      --muted: #a7b0d6;
      --danger: #ff8d8d;
      --success: #78e0a2;
      --warning: #ffbf69;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(115, 103, 240, 0.2), transparent 30%),
        radial-gradient(circle at bottom right, rgba(143, 133, 255, 0.18), transparent 34%),
        linear-gradient(180deg, #262b44 0%, #202338 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .shell {
      width: 100%;
      max-width: 900px;
      min-height: 760px;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 26px 80px rgba(9, 12, 25, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(37, 42, 66, 0.96);
    }

    .hero {
      background:
        linear-gradient(180deg, rgba(95, 87, 214, 0.22), transparent 60%),
        linear-gradient(180deg, #2a2f47 0%, #23273d 100%);
      padding: 38px 26px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-right: 1px solid rgba(255, 255, 255, 0.05);
    }

    .hero-badge {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), #9a90ff);
      box-shadow: 0 18px 30px rgba(115, 103, 240, 0.25);
    }

    .hero-copy h1 {
      margin: 18px 0 8px;
      font-size: 28px;
      line-height: 1.15;
    }

    .hero-copy p,
    .hero-foot p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .hero-points {
      display: grid;
      gap: 12px;
      margin-top: 24px;
    }

    .hero-point {
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: var(--muted);
      font-size: 13px;
    }

    .panel {
      padding: 44px 48px 36px;
      display: flex;
      flex-direction: column;
    }

    .tabs {
      width: 100%;
      background: rgba(20, 23, 37, 0.28);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 18px;
      padding: 6px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 28px;
    }

    .tab-btn {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 600;
      color: var(--muted);
      background: transparent;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .tab-btn.active {
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      box-shadow: 0 14px 28px rgba(115, 103, 240, 0.24);
    }

    .pane {
      display: none;
      animation: fadeUp 0.22s ease;
    }

    .pane.active {
      display: block;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .form-title {
      margin: 2px 0 24px;
    }

    .form-title h2 {
      margin: 0 0 6px;
      font-size: 28px;
      line-height: 1.15;
    }

    .form-title p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .input,
    .input-compact,
    .readonly-input {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.02);
      color: var(--text);
      font-size: 16px;
      padding: 14px 16px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    .input:focus,
    .input-compact:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-soft);
      transform: translateY(-1px);
    }

    .readonly-input {
      color: rgba(238, 241, 255, 0.78);
      background: rgba(255, 255, 255, 0.04);
    }

    .row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 128px;
      gap: 0;
      overflow: hidden;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.02);
    }

    .row .input-compact {
      border: 0;
      border-radius: 0;
      background: transparent;
    }

    .row .input-compact:focus {
      box-shadow: none;
      transform: none;
    }

    .row button {
      border: 0;
      background: rgba(115, 103, 240, 0.84);
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s ease, background 0.2s ease;
    }

    .row button:disabled {
      cursor: not-allowed;
      opacity: 0.75;
    }

    .hint {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .password-shell {
      position: relative;
    }

    .password-shell .input {
      padding-right: 48px;
    }

    .eye-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      border: 0;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      padding: 0;
    }

    .password-strength {
      margin-top: 10px;
      font-size: 14px;
      color: var(--warning);
      font-weight: 600;
    }

    .terms {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
      margin-top: 6px;
      margin-bottom: 24px;
    }

    .terms input {
      margin-top: 2px;
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
    }

    .terms a,
    .footnote a {
      color: #8d82ff;
      text-decoration: none;
    }

    .submit-btn {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 15px 18px;
      font-size: 16px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      box-shadow: 0 16px 30px rgba(115, 103, 240, 0.26);
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .submit-btn:hover {
      transform: translateY(-1px);
    }

    .submit-btn:disabled {
      cursor: not-allowed;
      opacity: 0.75;
      transform: none;
    }

    .message {
      display: none;
      margin-top: 16px;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 14px;
      line-height: 1.6;
    }

    .message.show {
      display: block;
    }

    .message.success {
      background: rgba(120, 224, 162, 0.12);
      color: var(--success);
      border: 1px solid rgba(120, 224, 162, 0.2);
    }

    .message.error {
      background: rgba(255, 141, 141, 0.12);
      color: var(--danger);
      border: 1px solid rgba(255, 141, 141, 0.2);
    }

    .footnote {
      margin-top: 26px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 860px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .hero {
        display: none;
      }

      .panel {
        padding: 28px 22px 24px;
      }
    }

    @media (max-width: 520px) {
      body {
        padding: 12px;
      }

      .shell {
        border-radius: 20px;
      }

      .row {
        grid-template-columns: 1fr;
      }

      .row button {
        min-height: 50px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="hero">
      <div>
        <div class="hero-badge">CQ</div>
        <div class="hero-copy">
          <h1>欢迎来到 CodeQuest</h1>
          <p>现在这页已经改成 QQ 邮箱验证码注册。用户可以填写自己的昵称，并使用 QQ 号或 QQ 邮箱完成注册。</p>
        </div>
        <div class="hero-points">
          <div class="hero-point">固定系统邀请码：<strong>8888</strong></div>
          <div class="hero-point">注册账号：昵称 + QQ + 验证码 + 密码</div>
          <div class="hero-point">登录支持：QQ号、QQ邮箱、普通邮箱</div>
        </div>
      </div>
      <div class="hero-foot">
        <p>如果验证码没到，请先检查 QQ 邮箱垃圾箱，再重新发送一次。</p>
      </div>
    </aside>

    <main class="panel">
      <div class="tabs">
        <button id="tab-login" class="tab-btn active" type="button" onclick="showPane('login')">登录</button>
        <button id="tab-register" class="tab-btn" type="button" onclick="showPane('register')">注册</button>
      </div>

      <section id="pane-login" class="pane active">
        <div class="form-title">
          <h2>登录账号</h2>
          <p>支持 QQ 号、QQ 邮箱和普通邮箱登录。</p>
        </div>

        <form onsubmit="handleLogin(event)">
          <div class="field">
            <label for="login-identifier">账号</label>
            <input
              id="login-identifier"
              class="input"
              type="text"
              placeholder="请输入 QQ 号、QQ 邮箱或邮箱"
              required
            />
          </div>

          <div class="field">
            <label for="login-password">密码</label>
            <div class="password-shell">
              <input
                id="login-password"
                class="input"
                type="password"
                placeholder="请输入密码"
                required
              />
              <button class="eye-btn" type="button" onclick="togglePassword('login-password', this)">
                <i data-lucide="eye-off" class="w-5 h-5"></i>
              </button>
            </div>
          </div>

          <button id="login-submit" class="submit-btn" type="submit">登录账号</button>
        </form>
      </section>

      <section id="pane-register" class="pane">
        <div class="form-title">
          <h2>注册账号</h2>
          <p>按 QQ 邮箱验证码流程注册，系统邀请码固定为 8888。</p>
        </div>

        <form onsubmit="handleRegister(event)">
          <div class="field">
            <label for="register-name">名称</label>
            <input
              id="register-name"
              class="input"
              type="text"
              placeholder="请输入您的姓名或昵称"
              maxlength="64"
              required
            />
          </div>

          <div class="field">
            <label for="register-qq">账号</label>
            <div class="row">
              <input
                id="register-qq"
                class="input-compact"
                type="text"
                placeholder="请输入您的 QQ 作为账号"
                pattern="([0-9]{5,12}|[0-9]{5,12}@qq\.com)"
                title="请输入 5-12 位 QQ 号，或 QQ 邮箱"
                required
              />
              <button id="send-code-btn" type="button" onclick="sendCode()">发送验证码</button>
            </div>
          </div>

          <div class="field">
            <label for="register-code">邮箱验证码</label>
            <input
              id="register-code"
              class="input"
              type="text"
              placeholder="请输入 6 位验证码"
              maxlength="6"
              pattern="[0-9]{6}"
              required
            />
            <div id="code-hint" class="hint">验证码会发送到您的 QQ 邮箱，请查收。</div>
          </div>

          <div class="field">
            <label for="register-password">密码</label>
            <div class="password-shell">
              <input
                id="register-password"
                class="input"
                type="password"
                placeholder="请输入密码"
                minlength="6"
                required
              />
              <button class="eye-btn" type="button" onclick="togglePassword('register-password', this)">
                <i data-lucide="eye-off" class="w-5 h-5"></i>
              </button>
            </div>
            <div class="password-strength">密码强度：<span id="password-strength">-</span></div>
          </div>

          <div class="field">
            <label for="register-invite">邀请码</label>
            <input id="register-invite" class="readonly-input" type="text" value="8888" readonly />
          </div>

          <label class="terms">
            <input id="register-terms" type="checkbox" required />
            <span>我同意 <a href="#">隐私政策</a> 和 <a href="#">服务条款</a></span>
          </label>

          <button id="register-submit" class="submit-btn" type="submit">注册账号</button>
        </form>
      </section>

      <div id="message" class="message"></div>

      <div class="footnote">
        已有账号？<a href="#" onclick="showPane('login'); return false;">回去登录</a>
      </div>
    </main>
  </div>

  <script>
    const API_BASE = window.location.origin.includes('localhost')
      ? `${window.location.protocol}//${window.location.hostname}:3000/api`
      : '/api';
    const FIXED_INVITE_CODE = '8888';

    let countdown = 0;
    let countdownTimer = null;

    function showPane(name) {
      const loginActive = name === 'login';
      document.getElementById('pane-login').classList.toggle('active', loginActive);
      document.getElementById('pane-register').classList.toggle('active', !loginActive);
      document.getElementById('tab-login').classList.toggle('active', loginActive);
      document.getElementById('tab-register').classList.toggle('active', !loginActive);
      hideMessage();
    }

    function normalizeQq(value) {
      const text = String(value || '').trim();
      const match = text.match(/^(\d{5,12})@qq\.com$/i);
      return match ? match[1] : text;
    }

    function isValidQq(qq) {
      return /^\d{5,12}$/.test(qq) && !qq.startsWith('0');
    }

    function showMessage(text, type) {
      const message = document.getElementById('message');
      message.textContent = text;
      message.className = `message show ${type}`;
    }

    function hideMessage() {
      const message = document.getElementById('message');
      message.className = 'message';
      message.textContent = '';
    }

    function togglePassword(inputId, button) {
      const input = document.getElementById(inputId);
      const icon = button.querySelector('i');
      const show = input.type === 'password';
      input.type = show ? 'text' : 'password';
      icon.setAttribute('data-lucide', show ? 'eye' : 'eye-off');
      lucide.createIcons();
    }

    function getPasswordStrength(password) {
      if (!password) {
        return { text: '-', color: 'var(--muted)' };
      }

      let score = 0;
      if (password.length >= 6) score += 1;
      if (password.length >= 10) score += 1;
      if (/\d/.test(password)) score += 1;
      if (/[a-z]/.test(password) && /[A-Z]/.test(password)) score += 1;
      if (/[^a-zA-Z0-9]/.test(password)) score += 1;

      if (score <= 2) return { text: '较弱', color: 'var(--danger)' };
      if (score <= 4) return { text: '中等', color: 'var(--warning)' };
      return { text: '较强', color: 'var(--success)' };
    }

    async function sendCode() {
      hideMessage();

      const button = document.getElementById('send-code-btn');
      const raw = document.getElementById('register-qq').value.trim();
      const qq = normalizeQq(raw);

      if (!isValidQq(qq)) {
        showMessage('请输入正确的 QQ 号或 QQ 邮箱，例如 123456789 或 123456789@qq.com。', 'error');
        return;
      }

      button.disabled = true;
      button.textContent = '发送中...';

      try {
        const response = await fetch(`${API_BASE}/email/send-code`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ qq })
        });
        const data = await response.json().catch(() => ({}));

        if (!response.ok || !data.success) {
          showMessage(data.error || '验证码发送失败，请稍后重试。', 'error');
          document.getElementById('code-hint').textContent = '发送失败时，请检查 QQ 号格式或邮箱服务配置。';
          button.disabled = false;
          button.textContent = '发送验证码';
          return;
        }

        showMessage('验证码已发送到您的 QQ 邮箱，请查收。', 'success');
        document.getElementById('code-hint').textContent = '验证码已发送到您的 QQ 邮箱，请查收。';

        countdown = 60;
        button.textContent = `重新发送 (${countdown}s)`;

        if (countdownTimer) {
          clearInterval(countdownTimer);
        }

        countdownTimer = setInterval(() => {
          countdown -= 1;
          if (countdown <= 0) {
            clearInterval(countdownTimer);
            countdownTimer = null;
            button.disabled = false;
            button.textContent = '重新发送';
            return;
          }

          button.textContent = `重新发送 (${countdown}s)`;
        }, 1000);
      } catch (error) {
        showMessage('网络错误，验证码发送失败，请稍后重试。', 'error');
        button.disabled = false;
        button.textContent = '发送验证码';
      }
    }

    async function handleRegister(event) {
      event.preventDefault();
      hideMessage();

      const name = document.getElementById('register-name').value.trim();
      const qq = normalizeQq(document.getElementById('register-qq').value.trim());
      const emailCode = document.getElementById('register-code').value.trim();
      const password = document.getElementById('register-password').value;
      const submitButton = document.getElementById('register-submit');

      if (!name) {
        showMessage('请输入您的姓名或昵称。', 'error');
        return;
      }

      if (!isValidQq(qq)) {
        showMessage('请输入正确的 QQ 号或 QQ 邮箱。', 'error');
        return;
      }

      if (!/^\d{6}$/.test(emailCode)) {
        showMessage('请输入 6 位邮箱验证码。', 'error');
        return;
      }

      if (password.length < 6) {
        showMessage('密码至少需要 6 位。', 'error');
        return;
      }

      submitButton.disabled = true;
      submitButton.textContent = '注册中...';

      try {
        const response = await fetch(`${API_BASE}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name,
            qq,
            email_code: emailCode,
            password,
            invite_code: FIXED_INVITE_CODE
          })
        });
        const data = await response.json().catch(() => ({}));

        if (!response.ok || !data.success) {
          showMessage(data.error || '注册失败，请稍后重试。', 'error');
          submitButton.disabled = false;
          submitButton.textContent = '注册账号';
          return;
        }

        if (data.user?.token) {
          localStorage.setItem('codequest_token', data.user.token);
          localStorage.setItem('codequest_user', JSON.stringify(data.user));
        }

        showMessage('注册成功，正在跳转...', 'success');
        setTimeout(() => {
          window.location.href = data.user?.role === 'super_admin' || data.user?.role === 'admin'
            ? '/admin.html'
            : '/index.html';
        }, 900);
      } catch (error) {
        showMessage('网络错误，注册失败，请稍后重试。', 'error');
        submitButton.disabled = false;
        submitButton.textContent = '注册账号';
      }
    }

    async function handleLogin(event) {
      event.preventDefault();
      hideMessage();

      const identifier = document.getElementById('login-identifier').value.trim();
      const password = document.getElementById('login-password').value;
      const submitButton = document.getElementById('login-submit');
      const normalizedQq = normalizeQq(identifier);

      let payload = null;
      if (isValidQq(normalizedQq)) {
        payload = { qq: normalizedQq, password };
      } else if (/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(identifier)) {
        payload = { email: identifier, password };
      } else {
        showMessage('请输入正确的 QQ 号、QQ 邮箱或邮箱地址。', 'error');
        return;
      }

      submitButton.disabled = true;
      submitButton.textContent = '登录中...';

      try {
        const response = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await response.json().catch(() => ({}));

        if (!response.ok || !data.success) {
          showMessage(data.error || '登录失败，请稍后重试。', 'error');
          submitButton.disabled = false;
          submitButton.textContent = '登录账号';
          return;
        }

        localStorage.setItem('codequest_token', data.user.token);
        localStorage.setItem('codequest_user', JSON.stringify(data.user));

        showMessage('登录成功，正在跳转...', 'success');
        setTimeout(() => {
          window.location.href = data.user.role === 'super_admin' || data.user.role === 'admin'
            ? '/admin.html'
            : '/index.html';
        }, 800);
      } catch (error) {
        showMessage('网络错误，登录失败，请稍后重试。', 'error');
        submitButton.disabled = false;
        submitButton.textContent = '登录账号';
      }
    }

    document.getElementById('register-password').addEventListener('input', (event) => {
      const result = getPasswordStrength(event.target.value);
      const target = document.getElementById('password-strength');
      target.textContent = result.text;
      target.style.color = result.color;
    });

    const token = localStorage.getItem('codequest_token');
    if (token) {
      try {
        const user = JSON.parse(localStorage.getItem('codequest_user'));
        if (user) {
          window.location.href = user.role === 'super_admin' || user.role === 'admin'
            ? '/admin.html'
            : '/index.html';
        }
      } catch (error) {
        localStorage.removeItem('codequest_token');
        localStorage.removeItem('codequest_user');
      }
    }

    lucide.createIcons();
  </script>
</body>
</html>
