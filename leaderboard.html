<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>排行榜 - CodeQuest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
          colors: {
            primary: { 500: 'oklch(0.65 0.25 280)', 600: 'oklch(0.55 0.28 280)' },
            success: 'oklch(0.72 0.19 142)', warning: 'oklch(0.78 0.18 66)', danger: 'oklch(0.63 0.24 25)',
          },
        },
      },
    }
  </script>
  <link rel="stylesheet" href="css/shared.css">
</head>
<body class="bg-[oklch(0.145_0_0)] text-[oklch(0.985_0_0)] min-h-screen">
  <nav class="glass sticky top-0 z-50 border-b border-[oklch(0.2_0_0)]">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <a href="index.html" class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary-500 to-success flex items-center justify-center">
            <i data-lucide="graduation-cap" class="w-6 h-6 text-white"></i>
          </div>
          <span class="text-xl font-bold bg-gradient-to-r from-primary-500 to-success bg-clip-text text-transparent">CodeQuest</span>
        </a>
        <div class="hidden md:flex items-center gap-6">
          <a href="levels.html" class="text-[oklch(0.7_0_0)] hover:text-white transition-colors flex items-center gap-2">
            <i data-lucide="map" class="w-4 h-4"></i>学习路径
          </a>
          <a href="leaderboard.html" class="text-white font-medium flex items-center gap-2">
            <i data-lucide="trophy" class="w-4 h-4"></i>排行榜
          </a>
          <a href="backpack.html" class="text-[oklch(0.7_0_0)] hover:text-white transition-colors flex items-center gap-2">
            <i data-lucide="backpack" class="w-4 h-4"></i>我的背包
          </a>
        </div>
        <div class="flex items-center gap-4">
          <button class="relative p-2 text-[oklch(0.7_0_0)] hover:text-white"><i data-lucide="bell" class="w-5 h-5"></i></button>
          <div class="flex items-center gap-3">
            <span class="text-sm font-mono text-primary-500 hidden sm:inline">LV.12</span>
            <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=40&h=40&fit=crop&crop=face" alt="Avatar" class="w-9 h-9 rounded-full border-2 border-primary-500">
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-3xl font-bold flex items-center gap-2 mb-2">
          <i data-lucide="trophy" class="w-8 h-8 text-warning"></i>
          完整排行榜
        </h1>
        <p class="text-[oklch(0.6_0_0)]">Python 编程挑战 - 本周 XP 排行</p>
      </div>
      <div class="flex gap-2">
        <button class="px-4 py-2 bg-primary-600 text-white rounded-xl text-sm font-medium">本周</button>
        <button class="px-4 py-2 bg-[oklch(0.2_0_0)] text-[oklch(0.6_0_0)] rounded-xl text-sm font-medium hover:bg-[oklch(0.25_0_0)]">本月</button>
        <button class="px-4 py-2 bg-[oklch(0.2_0_0)] text-[oklch(0.6_0_0)] rounded-xl text-sm font-medium hover:bg-[oklch(0.25_0_0)]">全部</button>
      </div>
    </div>

    <div class="glass rounded-2xl overflow-hidden">
      <div class="divide-y divide-[oklch(0.2_0_0)]">
        <!-- 第1名 -->
        <div class="flex items-center gap-4 p-4 bg-gradient-to-r from-warning/15 to-transparent">
          <div class="w-12 h-12 rounded-full bg-gradient-to-br from-warning to-warning/50 flex items-center justify-center text-2xl font-bold shrink-0">🥇</div>
          <img src="https://images.unsplash.com/photo-1599566150163-29194dcaad36?w=48&h=48&fit=crop&crop=face" alt="" class="w-12 h-12 rounded-full border-2 border-warning shrink-0">
          <div class="flex-1 min-w-0">
            <h3 class="font-semibold">小明同学</h3>
            <p class="text-sm text-[oklch(0.5_0_0)]">Lv.15 · 学霸</p>
          </div>
          <div class="text-right shrink-0">
            <p class="font-mono font-bold text-lg text-warning">2,850</p>
            <p class="text-xs text-[oklch(0.5_0_0)]">XP</p>
          </div>
        </div>
        <!-- 第2名 -->
        <div class="flex items-center gap-4 p-4 hover:bg-[oklch(0.16_0_0)] transition-colors">
          <div class="w-12 h-12 rounded-full bg-gradient-to-br from-[oklch(0.7_0_0)] to-[oklch(0.6_0_0)] flex items-center justify-center font-bold text-[oklch(0.2_0_0)] shrink-0">🥈</div>
          <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=48&h=48&fit=crop&crop=face" alt="" class="w-12 h-12 rounded-full border-2 border-[oklch(0.6_0_0)] shrink-0">
          <div class="flex-1 min-w-0">
            <h3 class="font-semibold">小红同学</h3>
            <p class="text-sm text-[oklch(0.5_0_0)]">Lv.14</p>
          </div>
          <div class="text-right shrink-0">
            <p class="font-mono font-bold text-lg text-[oklch(0.7_0_0)]">2,640</p>
            <p class="text-xs text-[oklch(0.5_0_0)]">XP</p>
          </div>
        </div>
        <!-- 第3名 - 我 -->
        <div class="flex items-center gap-4 p-4 bg-primary-500/10 border-l-4 border-primary-500">
          <div class="w-12 h-12 rounded-full bg-gradient-to-br from-primary-500 to-primary-700 flex items-center justify-center font-bold text-primary-100 shrink-0">🥉</div>
          <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=48&h=48&fit=crop&crop=face" alt="" class="w-12 h-12 rounded-full border-2 border-primary-500 shrink-0">
          <div class="flex-1 min-w-0">
            <h3 class="font-semibold text-primary-500">你</h3>
            <p class="text-sm text-[oklch(0.5_0_0)]">Lv.12 · 当前用户</p>
          </div>
          <div class="text-right shrink-0">
            <p class="font-mono font-bold text-lg text-primary-500">1,250</p>
            <p class="text-xs text-[oklch(0.5_0_0)]">XP</p>
          </div>
        </div>
        <!-- 第4-10名 -->
        <div class="flex items-center gap-4 p-4 hover:bg-[oklch(0.16_0_0)] transition-colors">
          <div class="w-12 h-12 rounded-full bg-[oklch(0.2_0_0)] flex items-center justify-center font-bold text-[oklch(0.6_0_0)] shrink-0">4</div>
          <img src="https://images.unsplash.com/photo-1527980965255-d3b416303d12?w=48&h=48&fit=crop&crop=face" alt="" class="w-12 h-12 rounded-full border-2 border-[oklch(0.3_0_0)] shrink-0">
          <div class="flex-1 min-w-0"><h3 class="font-semibold">小刚同学</h3><p class="text-sm text-[oklch(0.5_0_0)]">Lv.10</p></div>
          <div class="text-right shrink-0"><p class="font-mono font-bold text-[oklch(0.6_0_0)]">980</p><p class="text-xs text-[oklch(0.5_0_0)]">XP</p></div>
        </div>
        <div class="flex items-center gap-4 p-4 hover:bg-[oklch(0.16_0_0)] transition-colors">
          <div class="w-12 h-12 rounded-full bg-[oklch(0.2_0_0)] flex items-center justify-center font-bold text-[oklch(0.6_0_0)] shrink-0">5</div>
          <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=48&h=48&fit=crop&crop=face" alt="" class="w-12 h-12 rounded-full border-2 border-[oklch(0.3_0_0)] shrink-0">
          <div class="flex-1 min-w-0"><h3 class="font-semibold">小华同学</h3><p class="text-sm text-[oklch(0.5_0_0)]">Lv.9</p></div>
          <div class="text-right shrink-0"><p class="font-mono font-bold text-[oklch(0.6_0_0)]">875</p><p class="text-xs text-[oklch(0.5_0_0)]">XP</p></div>
        </div>
        <div class="flex items-center gap-4 p-4 hover:bg-[oklch(0.16_0_0)] transition-colors">
          <div class="w-12 h-12 rounded-full bg-[oklch(0.2_0_0)] flex items-center justify-center font-bold text-[oklch(0.6_0_0)] shrink-0">6</div>
          <img src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=48&h=48&fit=crop&crop=face" alt="" class="w-12 h-12 rounded-full border-2 border-[oklch(0.3_0_0)] shrink-0">
          <div class="flex-1 min-w-0"><h3 class="font-semibold">小芳同学</h3><p class="text-sm text-[oklch(0.5_0_0)]">Lv.9</p></div>
          <div class="text-right shrink-0"><p class="font-mono font-bold text-[oklch(0.6_0_0)]">720</p><p class="text-xs text-[oklch(0.5_0_0)]">XP</p></div>
        </div>
        <div class="flex items-center gap-4 p-4 hover:bg-[oklch(0.16_0_0)] transition-colors">
          <div class="w-12 h-12 rounded-full bg-[oklch(0.2_0_0)] flex items-center justify-center font-bold text-[oklch(0.6_0_0)] shrink-0">7</div>
          <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=48&h=48&fit=crop&crop=face" alt="" class="w-12 h-12 rounded-full border-2 border-[oklch(0.3_0_0)] shrink-0">
          <div class="flex-1 min-w-0"><h3 class="font-semibold">小强同学</h3><p class="text-sm text-[oklch(0.5_0_0)]">Lv.8</p></div>
          <div class="text-right shrink-0"><p class="font-mono font-bold text-[oklch(0.6_0_0)]">650</p><p class="text-xs text-[oklch(0.5_0_0)]">XP</p></div>
        </div>
      </div>
    </div>

    <a href="index.html" class="inline-flex items-center gap-2 text-primary-500 hover:text-primary-400 font-medium mt-6">
      <i data-lucide="arrow-left" class="w-4 h-4"></i>返回首页
    </a>
  </main>

  <script src="js/shared.js"></script>
</body>
</html>
